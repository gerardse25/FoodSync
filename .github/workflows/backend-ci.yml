name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

          pip install fastapi sqlalchemy python-jose passlib[bcrypt] python-dotenv email-validator httpx pytest ruff black

      - name: Lint with Ruff
        run: ruff check .

      - name: Check format with Black
        run: black --check .

      - name: Check Python syntax
        run: python -m compileall .

      - name: Run tests if present
        run: |
          if find . -type f \( -path "*/backend/tests/*.py" -o -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest
          else
            echo "No tests found yet. Skipping pytest."
          fi